# StarlingX strongswan service override (boot-time)
#
# This override ensures strongswan.service does not fail when the IPsec
# certificate has not yet been provisioned (e.g., first boot after upgrade
# or fresh install). The ipsec-server client will call swanctl --load-all
# after certificate provisioning to load all connections.
#
# Puppet will later install a more complete override via
# platform::strongswan::config that includes additional settings
# (ExecStartPre, pmond integration, etc).

[Unit]
After=luks-fs-mgr.service

[Service]
ExecStartPre=/usr/bin/check-ipsec-luks-dir.sh
ExecStartPost=
ExecStartPost=-/usr/sbin/swanctl --load-all --noprompt
