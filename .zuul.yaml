---
- project:
    vars:
      ensure_tox_version: '<4'
    templates:
      - publish-stx-docs
      - stx-api-ref-jobs
      - stx-release-notes-jobs
    check:
      jobs:
        - openstack-tox-linters
        - sysinv-tox-py39
        - sysinv-tox-flake8
        - sysinv-tox-pylint
        - sysinv-tox-bandit
        - controllerconfig-tox-flake8
        - controllerconfig-tox-pylint
        - tsconfig__tox-pylint
        - tsconfig__tox-py39
        - tsconfig__tox-flake8
        - cgtsclient-tox-py39
        - cgtsclient-tox-pep8
        - cgtsclient-tox-pylint
    gate:
      jobs:
        - openstack-tox-linters
        - sysinv-tox-py39
        - sysinv-tox-flake8
        - sysinv-tox-pylint
        - sysinv-tox-bandit
        - controllerconfig-tox-flake8
        - controllerconfig-tox-pylint
        - tsconfig__tox-pylint
        - tsconfig__tox-py39
        - tsconfig__tox-flake8
        - cgtsclient-tox-py39
        - cgtsclient-tox-pep8
        - cgtsclient-tox-pylint
    post:
      jobs:
        - stx-config-upload-git-mirror

- job:
    name: sysinv-tox-py39
    parent: tox-py39
    description: |
      Run py39 test for sysinv
    timeout: 2700
    nodeset: debian-bullseye
    required-projects:
      - starlingx/fault
      - starlingx/utilities
      - starlingx/update
    files:
      - sysinv/sysinv/*
    vars:
      tox_envlist: py39
      python_version: 3.9
      tox_extra_args: -c sysinv/sysinv/sysinv/tox.ini

- job:
    name: sysinv-tox-flake8
    parent: tox
    description: |
      Run flake8 test for sysinv
    nodeset: debian-bullseye
    files:
      - sysinv/sysinv/*
    vars:
      tox_envlist: flake8
      tox_extra_args: -c sysinv/sysinv/sysinv/tox.ini

- job:
    name: sysinv-tox-pylint
    parent: tox
    description: |
      Run pylint test for sysinv
    nodeset: debian-bullseye
    required-projects:
      - starlingx/fault
      - starlingx/utilities
      - starlingx/update
    files:
      - sysinv/sysinv/*
    vars:
      tox_envlist: pylint
      tox_extra_args: -c sysinv/sysinv/sysinv/tox.ini

- job:
    name: sysinv-tox-bandit
    parent: tox
    description: |
      Run bandit test for sysinv
    nodeset: debian-bullseye
    files:
      - sysinv/sysinv/*
    vars:
      tox_envlist: bandit
      tox_extra_args: -c sysinv/sysinv/sysinv/tox.ini

- job:
    name: controllerconfig-tox-flake8
    parent: tox
    description: Run flake8 tests for controllerconfig
    nodeset: debian-bullseye
    files:
      - controllerconfig/*
    vars:
      tox_envlist: flake8
      tox_extra_args: -c controllerconfig/controllerconfig/tox.ini

- job:
    name: controllerconfig-tox-pylint
    parent: tox
    description: Run pylint tests for controllerconfig
    nodeset: debian-bullseye
    required-projects:
      - starlingx/fault
    files:
      - controllerconfig/*
    vars:
      tox_envlist: pylint
      tox_extra_args: -c controllerconfig/controllerconfig/tox.ini

- job:
    name: tsconfig__tox-pylint
    parent: tox
    nodeset: debian-bullseye
    description: Run pylint tests for tsconfig
    files:
      - tsconfig/*
    vars:
      tox_envlist: pylint
      tox_extra_args: -c tsconfig/tsconfig/tox.ini

- job:
    name: tsconfig__tox-py39
    parent: tox-py39
    description: Run py39 tests for tsconfig
    nodeset: debian-bullseye
    files:
      - tsconfig/*
    vars:
      tox_envlist: py39
      tox_extra_args: -c tsconfig/tsconfig/tox.ini

- job:
    name: tsconfig__tox-flake8
    parent: tox
    description: Run flake8 tests for tsconfig
    nodeset: debian-bullseye
    files:
      - tsconfig/*
    vars:
      tox_envlist: flake8
      tox_extra_args: -c tsconfig/tsconfig/tox.ini

- job:
    name: cgtsclient-tox-py39
    parent: tox-py39
    description: |
      Run py39 test for cgts-client
    nodeset: debian-bullseye
    files:
      - sysinv/cgts-client/*
    required-projects:
      - starlingx/utilities
    vars:
      python_version: 3.9
      tox_envlist: py39
      tox_extra_args: -c sysinv/cgts-client/cgts-client/tox.ini

- job:
    name: cgtsclient-tox-pep8
    parent: tox
    description: |
      Run pep8 test for cgts-client
    nodeset: debian-bullseye
    files:
      - sysinv/cgts-client/*
    required-projects:
      - starlingx/utilities
    vars:
      tox_envlist: pep8
      tox_extra_args: -c sysinv/cgts-client/cgts-client/tox.ini

- job:
    name: cgtsclient-tox-pylint
    parent: tox
    description: |
      Run pylint test for cgts-client
    nodeset: debian-bullseye
    files:
      - sysinv/cgts-client/*
    required-projects:
      - starlingx/utilities
    vars:
      tox_envlist: pylint
      tox_extra_args: -c sysinv/cgts-client/cgts-client/tox.ini

- job:
    name: stx-config-upload-git-mirror
    parent: upload-git-mirror
    description: >
      Mirrors opendev.org/starlingx/config to
      github.com/starlingx/config
    vars:
      git_mirror_repository: starlingx/config
    secrets:
      - name: git_mirror_credentials
        secret: stx-config-github-secret3
        pass-to-parent: true

